# Full path: Vina with real fpocket pockets, tiny dock pool (same order of magnitude as CI).
# Needs: vina, obabel, and fpocket (see dev_fpocket.yaml / dev_vina.yaml comments).

library_csv: ../data/library.csv
receptor_pdb: ../data/toy.pdb
profile: default
skip_evolution: true
skip_mutation: true
dry_run: false

resources:
  max_parallel_docks: 1
  max_parallel_http: 1

pubchem:
  max_hits_per_query: 3
  similarity_threshold: 0.7

dock_pool:
  mode: max_compounds
  max_compounds_to_dock: 3

fpocket:
  mode: fpocket
  use_stub_box: false
  top_k_pockets: 1
  box_padding_angstrom: 4.0

docking:
  mode: physics_only
  physics_backend: vina
  ml_backend: mock
  vina_seed: 42
  vina_exhaustiveness: 2
