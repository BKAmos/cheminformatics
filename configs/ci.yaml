library_csv: ../data/library.csv
receptor_pdb: ../data/toy.pdb
profile: ci
skip_evolution: true
skip_mutation: true
dry_run: false

resources:
  # Raise only after single-worker E2E runs (stub → fpocket → Vina) are known good.
  max_parallel_docks: 1
  max_parallel_http: 1

pubchem:
  max_hits_per_query: 5
  similarity_threshold: 0.7

dock_pool:
  mode: max_compounds
  max_compounds_to_dock: 20

fpocket:
  use_stub_box: true
  stub_center: [0.0, 0.0, 0.0]
  stub_size: [15.0, 15.0, 15.0]
