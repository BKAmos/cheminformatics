name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests
      - name: Pytest
        run: python -m pytest -q
      - name: End-to-end validation
        run: |
          workflow run --config configs/ci.yaml --run-dir .runs/ci_e2e
          workflow validate --suite ground_truth --run-dir .runs/ci_e2e
